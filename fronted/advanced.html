<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="advanced.css">
        <title>Google advanced search</title>

    </head>
    <body>
        <a href="index.html"><button>Google search</button></a>
        
        <h1 id="adv" >Advanced search</h1>
        <hr>
        <h2 id="q">all these words:</h2>
        <h2 id="epq">this exact word or phrase:</h2>
        <h2 id="oq">any of these words:</h2>
        <h2 id="eq">none of these words:</h2>
        <form action="https://google.com/search">
            
            <input size="70"  type="text" name="as_q">
             
             
            <input size="70"  type="text" name="as_epq">
            
             
            <input size="70" type="text" name="as_oq">
            
            <input size="70"  type="text" name="as_eq">
            <input type="submit"  value="Advanced Search">
